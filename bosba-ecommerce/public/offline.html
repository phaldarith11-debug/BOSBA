<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#e51b1b" />
    <title>You're offline — BOSBA</title>
    <link rel="icon" href="/icons/favicon-32.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <style>
      :root { --brand: #e51b1b; }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: #ffffff;
        color: #0f172a;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }
      .card { max-width: 420px; width: 100%; }
      .logo {
        width: 88px; height: 88px; border-radius: 22px;
        background: var(--brand); color: #fff;
        display: flex; align-items: center; justify-content: center;
        font-size: 44px; font-weight: 800; letter-spacing: 1px;
        margin: 0 auto 24px; box-shadow: 0 10px 30px rgba(229, 27, 27, 0.25);
      }
      h1 { font-size: 22px; margin: 0 0 8px; }
      p { font-size: 15px; line-height: 1.6; color: #64748b; margin: 0 0 24px; }
      button {
        background: var(--brand); color: #fff; border: 0;
        font-size: 15px; font-weight: 600; padding: 12px 28px;
        border-radius: 12px; cursor: pointer;
      }
      button:active { transform: translateY(1px); }
      .hint { margin-top: 18px; font-size: 13px; color: #94a3b8; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">B</div>
      <h1>You're offline</h1>
      <p>
        We can't reach BOSBA right now. Check your internet connection and try
        again. Pages you've already visited may still be available.
      </p>
      <button onclick="location.reload()">Try again</button>
      <div class="hint">BOSBA — Cambodia's Online Store</div>
    </div>
    <script>
      // Auto-retry the moment connectivity returns.
      window.addEventListener("online", () => location.reload());
    </script>
  </body>
</html>
